version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ems_postgres
    environment:
      POSTGRES_USER: ems_user
      POSTGRES_PASSWORD: ems_secure_password
      POSTGRES_DB: ems_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ems_user -d ems_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: